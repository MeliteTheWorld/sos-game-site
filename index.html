<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <body>
        <header>
            <div class="header__container">
                <div class="header__logo">
                    <img class="header__logo-img" src="img/logo.png" alt="">
                </div>
                <div class="header__nav">
                    <ul class="nav__list">
                        <li class="nav__item">
                            <a class="nav__link" href="">MAIN</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="">ABOUT</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="">GAME FEATURES</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="">SYTEM REQUIREMENTS</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="">QUOTES</a>
                        </li>
                    </ul>
                </div>
                <div class="header__actions">
                    <div class="header__lang">
                        <button class="lang__btn">ENG
                        <img class="lang__arrow" src="icon/dropdown.svg" alt="">
                    </button>

                        <ul class="lang__dropdown">
                            <li>
                                <a class="lang__item" href="#">RUS</a>
                            </li>
                            <li>
                                <a class="lang__item" href="#">FRA</a>
                            </li>
                            <li>
                                <a class="lang__item" href="#">DEU</a>
                            </li>
                        </ul>
                    </div>
                    <div class="nav__divider"></div>
                    <div class="header__social">
                        <a class="social__xbox" href="#">
                            <img class="social__xbox-img" src="icon/xbox icon.svg" alt="">
                        </a>
                        <a class="social__steam" href="#">
                            <img class="social__steam-img" src="icon/steam icon.svg" alt="">
                        </a>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <div class="hero">
                <div class="hero__container">
                    <h1 class="hero__title">Survive At All Costs</h1>
                    <p class="hero__sub">Experience New Social Battle Royale Game</p>
                    <button class="hero__btn">Buy now on Steam | $14.99</button>
                </div>
            </div>
        </main>
        <footer>

        </footer>
        <script src="scripts.js"></script>
    </body>

</html>
